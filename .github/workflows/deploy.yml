name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 115908659860.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: japaflow/japaflow-fe
  IMAGE_TAG: latest
  OSS_ENABLED: ${{ vars.OSS_ENABLED || 'false' }}
  OSS_BASE_URL: ${{ vars.OSS_BASE_URL || '' }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build \
            --build-arg OSS_ENABLED="${OSS_ENABLED}" \
            --build-arg OSS_BASE_URL="${OSS_BASE_URL}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            .

      - name: Push image
        run: docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_DIR }}"
            docker compose pull
            docker compose up -d
            docker image prune -f
